<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{categoryLabel}} Tools — BKX Labs</title>
  <meta name="description" content="Free {{categoryLabel}} tools. {{categoryDescription}}" />
  <link rel="canonical" href="https://tools.bkxlabs.com/{{category}}/" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="tools-header-logo">
        <a href="https://tools.bkxlabs.com/" class="tools-logo-anchor" aria-label="BKX Labs Tools — Home">
          <img src="/favicon-32x32.png" alt="BKX Labs Logo" class="tools-favicon-img" />
        </a>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <nav aria-label="Breadcrumb" style="margin-bottom: 1rem;">
        <ol class="breadcrumb">
          <li><a href="/">Tools</a></li>
          <li aria-current="page">{{categoryLabel}}</li>
        </ol>
      </nav>

      <div class="category-hero">
        <h1>{{categoryLabel}} Tools</h1>
        <p>{{categoryDescription}}</p>
      </div>

      <div class="tools-grid">
        {{toolCards}}
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>&copy; 2025 <a href="https://bkxlabs.com">BKX Labs</a>. All rights reserved.</span>
      <span><a href="/">All Tools</a> &middot; <a href="/privacy/">Privacy Policy</a></span>
    </div>
  </footer>

</body>
</html>
