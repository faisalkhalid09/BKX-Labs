<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Preconnect first — must be before any external resource reference -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.googletagmanager.com">

  <!-- Google Analytics (GA4) — async, never blocks rendering -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-R9R44GVLGG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-R9R44GVLGG');
  </script>

  <!-- Google Fonts — non-blocking (print trick: loads async, then applies) -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
        media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap">
  </noscript>

  <!-- Preload critical assets -->
  <link rel="preload" as="image" href="/brand-logo.png" fetchpriority="high" />

  <!-- Primary Meta Tags -->
  <title>BKX Labs - International Software Project Rescue Agency</title>
  <meta name="description" content="BKX Labs is the engineering team you call when your software is failing. We rescue stalled Laravel apps, audit enterprise React codebases, and fix technical debt nightmares. 25-person specialist team." />
  <meta name="author" content="BKX Labs - Faisal Khalid" />
  <meta name="robots" content="index, follow" />
  <meta name="language" content="English" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://bkxlabs.com/" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://bkxlabs.com/" />
  <meta property="og:title" content="BKX Labs - International Software Project Rescue Agency" />
  <meta property="og:description" content="BKX Labs is the engineering team you call when your software is failing. We rescue stalled Laravel apps, audit enterprise React codebases, and fix technical debt nightmares." />
  <meta property="og:image" content="https://bkxlabs.com/brand-logo.png" />
  <meta property="og:site_name" content="BKX Labs" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="BKX Labs - International Software Project Rescue Agency" />
  <meta name="twitter:description" content="BKX Labs rescues stalled software projects. Forensic codebase audits, emergency triage, and long-term modernization for enterprise teams." />
  <meta name="twitter:image" content="https://bkxlabs.com/brand-logo.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Structured Data - Organization Schema -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://bkxlabs.com/#organization",
      "name": "BKX Labs",
      "url": "https://bkxlabs.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://bkxlabs.com/brand-logo.png"
      },
      "description": "Enterprise-grade software rescue agency specializing in taking over stalled projects, eliminating technical debt, and delivering production-ready solutions for international businesses.",
      "founder": {
        "@type": "Person",
        "name": "Faisal Khalid",
        "url": "https://www.linkedin.com/in/faisal-khalid1622/"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "contact@bkxlabs.com",
        "contactType": "Customer Support",
        "availableLanguage": "English",
        "areaServed": ["US", "GB", "AU", "CA", "EU"]
      },
      "sameAs": [
        "https://www.linkedin.com/company/bkxlabs",
        "https://www.linkedin.com/in/faisal-khalid1622/"
      ]
    }
  </script>

  <!-- Structured Data - Professional Service Schema -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "@id": "https://bkxlabs.com/#service",
      "name": "BKX Labs",
      "image": "https://bkxlabs.com/brand-logo.png",
      "description": "International software project rescue agency. We take over failing Laravel apps, audit enterprise React codebases, eliminate technical debt, and deliver production-ready systems for global businesses.",
      "priceRange": "$$-$$$",
      "url": "https://bkxlabs.com",
      "email": "contact@bkxlabs.com",
      "areaServed": ["US", "GB", "AU", "CA", "EU"],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Software Rescue Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Diagnostic Codebase Audit" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Emergency Triage & Stabilization" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Modernization Retainer" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Greenfield Development" } }
        ]
      }
    }
  </script>

  <style>
    @keyframes bkxPulse {
      0%,
      100% { opacity: 0.75; }
      50% { opacity: 1; }
    }

    @keyframes bkxLoad {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(300%); }
    }
  </style>

</head>

<body>
  <div id="root">
    <div style="min-height:100svh;display:flex;align-items:center;justify-content:center;background:#0f172a;color:#e2e8f0;font-family:Outfit,Inter,system-ui,sans-serif;">
      <div style="width:min(560px,92vw);padding:2rem 1.25rem;text-align:center;">
        <img src="/brand-logo.png" alt="BKX Labs" style="height:36px;width:auto;margin:0 auto 1.25rem;opacity:0.92;animation:bkxPulse 1.8s ease-in-out infinite;" fetchpriority="high" />
        <p style="font-size:0.95rem;letter-spacing:0.08em;text-transform:uppercase;color:#94a3b8;margin:0 0 1rem;">Loading Workspace</p>
        <div style="height:6px;border-radius:999px;background:#1e293b;overflow:hidden;position:relative;">
          <span style="position:absolute;inset:0 auto 0 0;width:42%;background:linear-gradient(90deg,#38bdf8 0%,#2563eb 100%);border-radius:999px;animation:bkxLoad 1.2s ease-in-out infinite;"></span>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Google AdSense — injected only when browser is idle, never during initial load -->
  <script>
    (function() {
      var loadAds = function() {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8538157876247266';
        s.crossOrigin = 'anonymous';
        document.head.appendChild(s);
      };
      // Load ads only when browser is idle (after page content is interactive)
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadAds, { timeout: 4000 });
      } else {
        // Fallback for Safari: wait 3s after load
        window.addEventListener('load', function() {
          setTimeout(loadAds, 3000);
        });
      }
    })();
  </script>
</body>

</html>
