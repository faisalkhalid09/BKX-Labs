# ════════════════════════════════════════════════════════
#  BKX Labs Tools — Nginx Location Block
#  ADD THIS TO YOUR EXISTING HTTPS SERVER CONFIG
#  Place it BEFORE the "Backend Dynamic Routes" section
# ════════════════════════════════════════════════════════

# ── G. Tools Web App (Next.js on localhost:3000) ──────────
location /tools {
    # Proxy to Next.js app running on port 3000
    proxy_pass http://localhost:3000;
    proxy_http_version 1.1;
    
    # Required headers for Next.js
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Timeouts and buffering
    proxy_cache_bypass $http_upgrade;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Don't cache dynamic pages (Next.js handles caching with headers)
    # Static assets in Next.js .next folder are already hashed
    proxy_cache_bypass $http_pragma $http_authorization;
}

# ── Tools Static Assets (if any direct access needed) ────
location ^~ /.next/ {
    proxy_pass http://localhost:3000;
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Vary "Accept-Encoding";
    access_log off;
}
