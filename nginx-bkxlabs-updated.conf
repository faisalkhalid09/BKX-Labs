# ════════════════════════════════════════════════════════
#  BKX Labs — Nginx Site Config (Optimized + Tools)
#  File: /etc/nginx/sites-available/bkxlabs.com
# ════════════════════════════════════════════════════════

# ── HTTP → HTTPS (clean redirect, no duplicate ifs) ──────
server {
    listen 80;
    server_name bkxlabs.com www.bkxlabs.com;
    return 301 https://bkxlabs.com$request_uri;
}

# ── WWW → non-WWW ────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.bkxlabs.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/bkxlabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bkxlabs.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://bkxlabs.com$request_uri;
}

# ── Main HTTPS Server ─────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name bkxlabs.com;
    root /var/www/BKX-Labs/frontend/dist;
    index index.html;
    server_tokens off;

    # ── SSL ───────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/bkxlabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bkxlabs.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    ssl_session_cache shared:SSL:10m;


    # ── Gzip Compression ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        font/woff2
        image/svg+xml
        text/css
        text/html
        text/javascript
        text/plain;

    # ── Security Headers ──────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── A. Backend Static Assets (PRIORITY, with cache) ───
    location ^~ /storage/ {
        root /var/www/BKX-Labs/backend/public;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ^~ /build/ {
        root /var/www/BKX-Labs/backend/public;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ^~ /css/ {
        root /var/www/BKX-Labs/backend/public;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location ^~ /js/ {
        root /var/www/BKX-Labs/backend/public;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── B. Vite Hashed Assets (1-year immutable cache) ────
    # These filenames contain content hashes — safe to cache forever.
    # e.g. /assets/vendor-react-WWYe066m.js
    location ^~ /assets/ {
        root /var/www/BKX-Labs/frontend/dist;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ── G. Tools Routes (SEO-optimized, server-side rendered by Laravel) ────
    # These routes are now served by the Laravel backend with full metadata injection
    # for Google, Bing, and AI crawlers to see tool-specific content immediately.
    location ^~ /tools/ {
        root /var/www/BKX-Labs/backend/public;
        try_files $uri $uri/ @backend;
    }

    location = /tools {
        root /var/www/BKX-Labs/backend/public;
        try_files $uri $uri/ @backend;
    }

    # ── DEPRECATED: H. Tools Static Assets (Next.js) ─────────
    # These are no longer needed — tools now served by Laravel
    # location ^~ /tools/_next/ {
    #     proxy_pass http://localhost:3000;
    #     expires 1y;
    #     add_header Cache-Control "public, immutable";
    #     add_header Vary "Accept-Encoding";
    #     access_log off;
    # }

    # ── C. Backend Dynamic Routes ─────────────────────────
    location ~ ^/(admin|api|store|login|register|logout|verify-otp|checkout|downloads|livewire|profile|webhook) {
        root /var/www/BKX-Labs/backend/public;
        try_files $uri $uri/ @backend;
    }

    # ── D. FastCGI Hand-off ───────────────────────────────
    location @backend {
        root /var/www/BKX-Labs/backend/public;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param REQUEST_URI $request_uri;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;
    }

    # ── E. Frontend Static Files (favicon, images, fonts) ─
    location ~* \.(ico|png|jpg|jpeg|webp|svg|gif|woff2?|ttf)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── F. React SPA ──────────────────────────────────────
    # index.html must NEVER be cached — it references hashed assets
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}
